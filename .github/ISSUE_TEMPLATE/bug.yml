name: Bug report
description: Something is broken or behaves wrong.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please include enough information for
        someone to reproduce locally. Security issues should be reported
        privately — see SECURITY.md.

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps to reproduce, or a minimal command sequence.
      placeholder: |
        1. ...
        2. ...
        3. observe `cargo test` fail / daemon panic / etc.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version (commit SHA or tag)
      description: Output of `git rev-parse HEAD` or the released version.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Other (please describe in "What happened")
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant logs. Run with `RUST_LOG=debug` if useful.
      render: shell
