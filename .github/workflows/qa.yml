name: QA

# Functional QA for postblox: builds the binaries from the PR branch,
# spawns a fresh daemon under a tempdir, drives the TUI through tuistory,
# the daemon directly over the Unix socket, and the MCP bridge over
# stdio JSON-RPC. Routed by .factory/skills/qa/ + qa-<app>/ sub-skills.
#
# This check is intended to be REQUIRED in branch protection. Until a
# repo admin enables that, GitHub will treat it as a normal PR check.

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: qa-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  qa:
    name: qa (functional)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      CI: 'true'

    steps:
      - name: Checkout (full history for diff analysis)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ImageMagick (animated GIF diffs)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick xclip xvfb

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python (for IPC and MCP helpers)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: qa

      - name: Install tuistory
        run: npm install -g tuistory

      - name: Install droid CLI
        run: curl -fsSL https://app.factory.ai/cli | sh

      - name: Build all binaries from the PR branch
        run: cargo build --bin postbloxd --bin postblox --bin postblox-mcp --locked

      - name: Run QA skill
        id: qa
        continue-on-error: true
        timeout-minutes: 18
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
        run: |
          set -e
          mkdir -p qa-results
          # The xvfb-run wrapper gives the TUI a virtual display so the
          # arboard clipboard surface initialises cleanly. Without it,
          # `:copy`-style flows surface a "no display" error in CI.
          xvfb-run -a droid exec --auto high \
            "Run the qa skill from .factory/skills/qa/SKILL.md.

            You are running in a non-interactive CI environment. There is
            NO human available. Do NOT use AskUser, do NOT wait for
            confirmations, do NOT pause for input.

            Analyse the PR diff against origin/${{ github.base_ref || 'main' }}
            to determine which apps (daemon, TUI, MCP) are affected, then
            run only the matching qa-<app> sub-skill flows.

            Write the final report to qa-results/report.md. The report
            MUST start with the literal HTML marker '<!-- qa-report -->'
            on the first line so the PR-comment step can find and update
            it on subsequent pushes." \
            2>&1 | tee qa-results/qa-output.txt

      - name: Ensure report exists
        if: always()
        run: |
          if [ ! -f qa-results/report.md ]; then
            echo '<!-- qa-report -->' > qa-results/report.md
            echo '## QA Report' >> qa-results/report.md
            echo '' >> qa-results/report.md
            echo ':no_entry: QA agent did not produce a report. Raw output:' >> qa-results/report.md
            echo '' >> qa-results/report.md
            echo '<details><summary>qa-output.txt (last 200 lines)</summary>' >> qa-results/report.md
            echo '' >> qa-results/report.md
            echo '```' >> qa-results/report.md
            tail -n 200 qa-results/qa-output.txt 2>/dev/null || echo '(no output captured)' >> qa-results/report.md
            echo '```' >> qa-results/report.md
            echo '' >> qa-results/report.md
            echo '</details>' >> qa-results/report.md
          fi

      - name: Append workflow footer to report
        if: always()
        run: |
          {
            echo ''
            echo '---'
            echo "_Workflow: [${{ github.workflow }} #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · Artifacts: download from the workflow run page._"
          } >> qa-results/report.md

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-results-${{ github.run_number }}
          path: qa-results/
          retention-days: 14

      - name: Post or update PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('qa-results/report.md', 'utf8');
            const marker = '<!-- qa-report -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = parseInt(process.env.PR_NUMBER, 10);

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
              core.notice(`Updated existing QA comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
              core.notice('Created new QA comment');
            }

      - name: Fail the job if QA reported failures
        if: always()
        run: |
          if [ "${{ steps.qa.outcome }}" != "success" ]; then
            echo "QA agent step did not exit cleanly (outcome=${{ steps.qa.outcome }})"
            exit 1
          fi
          # Treat presence of :x: or :no_entry: emojis in the report as a failure
          # so the merge is blocked when QA finds real bugs (per branch
          # protection setup).
          if grep -E ':(x|no_entry):' qa-results/report.md >/dev/null 2>&1; then
            echo "QA report contains FAIL or BLOCKED rows -- failing the job."
            exit 1
          fi
