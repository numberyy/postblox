name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - run: cross build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR=postblox-${VERSION}-${{ matrix.target }}
          mkdir "$DIR"
          cp target/${{ matrix.target }}/release/postblox "$DIR/"
          cp target/${{ matrix.target }}/release/postblox-mcp "$DIR/"
          cp target/${{ matrix.target }}/release/postblox-tui "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: '*.tar.gz'

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR=postblox-${VERSION}-${{ matrix.target }}
          mkdir "$DIR"
          cp target/${{ matrix.target }}/release/postblox "$DIR/"
          cp target/${{ matrix.target }}/release/postblox-mcp "$DIR/"
          cp target/${{ matrix.target }}/release/postblox-tui "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: '*.tar.gz'

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            *.tar.gz
