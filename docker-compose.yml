services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: postblox
      POSTGRES_USER: postblox
      POSTGRES_PASSWORD: postblox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postblox"]
      interval: 5s
      timeout: 3s
      retries: 5

  stalwart:
    image: stalwartlabs/stalwart:latest
    ports:
      - "8080:8080"
      - "25:25"
      - "993:993"
    volumes:
      - stalwart_data:/opt/stalwart
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5

  postblox:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postblox:postblox@postgres:5432/postblox
      STALWART_URL: http://stalwart:8080
      STALWART_ADMIN_USER: admin
      STALWART_ADMIN_TOKEN: changeme
      POSTBLOX_HOST: 0.0.0.0
      POSTBLOX_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      stalwart:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - gpu

volumes:
  postgres_data:
  stalwart_data:
  ollama_data:
