services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: postblox
      POSTGRES_USER: postblox
      POSTGRES_PASSWORD: postblox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postblox"]
      interval: 5s
      timeout: 3s
      retries: 5

  stalwart:
    image: stalwartlabs/stalwart:latest
    ports:
      - "8080:8080"
      - "25:25"
      - "587:587"
      - "465:465"
      - "993:993"
    volumes:
      - stalwart_data:/opt/stalwart
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postblox:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postblox:postblox@postgres:5432/postblox
      STALWART_URL: http://stalwart:8080
      STALWART_ADMIN_USER: admin
      STALWART_ADMIN_TOKEN: changeme
      STALWART_INBOUND_TOKEN: ${STALWART_INBOUND_TOKEN:-postblox-inbound-default}
      POSTBLOX_HOST: 0.0.0.0
      POSTBLOX_PORT: "3000"
      ATTACHMENT_STORAGE_PATH: /data/attachments
    volumes:
      - postblox_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      stalwart:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - gpu

volumes:
  postgres_data:
  stalwart_data:
  postblox_data:
  ollama_data:
