msrv = "1.80"

# Thresholds tuned for postblox's current shape — see F-M6 in
# plans/rust-skills-review.md. Lower these as the dispatcher and the
# multi-arg builders are split up.
cognitive-complexity-threshold = 30
too-many-arguments-threshold = 8
type-complexity-threshold = 250

