[package]
name = "postblox"
version = "1.0.0"
edition = "2021"
rust-version = "1.80"
description = "Self-hosted email infrastructure for AI agents"
license = "MIT"

[[bin]]
name = "postblox"
path = "src/main.rs"

[[bin]]
name = "postblox-mcp"
path = "src/mcp/main.rs"

[[bin]]
name = "postblox-tui"
path = "src/tui/main.rs"

[dependencies]
axum = { version = "0.8", features = ["ws"] }
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio", "chrono", "uuid", "json", "migrate"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
mail-parser = "0.9"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
hmac = "0.12"
sha2 = "0.10"
regex = "1"
thiserror = "2"
anyhow = "1"
pgvector = { version = "0.4", features = ["sqlx"] }
async-imap = { version = "0.10", default-features = false, features = ["runtime-tokio"] }
tokio-rustls = "0.26"
futures = "0.3"
webpki-roots = "1"
chrono-tz = "0.10"
lettre = { version = "0.11.19", default-features = false, features = ["smtp-transport", "tokio1-rustls-tls", "pool"] }
minijinja = { version = "2", features = ["builtins"] }
dashmap = "6"
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }
tui-textarea = { version = "0.7", features = ["crossterm"] }
tokio-tungstenite = { version = "0.26", features = ["rustls-tls-webpki-roots"] }
urlencoding = "2"
base64 = "0.22"
clap = { version = "4", features = ["derive", "env"] }
dialoguer = "0.11"
hickory-resolver = "0.25"

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
