services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: postblox_test
      POSTGRES_USER: postblox
      POSTGRES_PASSWORD: postblox
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postblox"]
      interval: 2s
      timeout: 2s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  stalwart:
    image: stalwartlabs/stalwart:latest
    ports:
      - "8080:8080"
      - "2525:25"
      - "9930:993"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /opt/stalwart
