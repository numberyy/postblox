[advisories]
# Tracked-but-ignored advisories. Each entry is a transitive that we
# cannot control directly today; the comment documents which upstream
# release is expected to clear it. Re-evaluate on every dep bump.
ignore = [
    # SQLx 0.8 locks sqlx-mysql/rsa through weak optional macro/json deps
    # even though postblox enables SQLite only; `cargo tree -i rsa` has
    # no active dependency path. Drops out when SQLx 0.9 lands and we
    # bump.
    "RUSTSEC-2023-0071",
    # ratatui 0.29 transitively depends on `paste` (unmaintained as of
    # 2024-10-07). Pulled in via `ratatui::style::palette::tailwind`;
    # there is no live security exposure. Tracked upstream:
    # https://github.com/ratatui-org/ratatui/issues/1545. Removed once
    # ratatui drops the macro.
    "RUSTSEC-2024-0436",
    # ratatui 0.29 transitively depends on `lru 0.12.5`; the unsound
    # `IterMut` advisory is for an iterator postblox does not call into.
    # Will clear on `lru` 0.13 or a ratatui release that bumps it.
    "RUSTSEC-2026-0002",
]
